<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ארץ עיר מקומי - משפחתי</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #f5a623; --success: #7ed321; --danger: #d0021b; --bg: #f0f4f8; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; direction: rtl; color: var(--text);}
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 95%; max-width: 800px; text-align: center; margin: 20px 0; display: flex; flex-direction: column;}
        h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 0.5rem; }
        .version-badge { font-size: 0.5em; color: white; background-color: var(--secondary); padding: 5px 10px; border-radius: 20px; vertical-align: middle;}
        .screen { display: none; flex-direction: column; } .active { display: flex; }
        input[type="text"], select { width: 100%; padding: 12px; margin: 5px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 10px; padding: 12px 24px; font-size: 1.2rem; font-weight: bold; width: 100%; margin-top: 10px; transition: transform 0.1s;}
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-skip { background: #eee; color: #666; width: auto; padding: 8px 15px; font-size: 0.9rem; margin-right: 10px; }
        .countdown { font-size: 8rem; color: var(--primary); font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .letter-display { font-size: 6rem; color: var(--secondary); font-weight: bold; margin: 1rem 0; }
        .category-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; text-align: right; }
        .category-row label { width: 110px; font-weight: bold; font-size: 1.1rem; }
        .category-row input { margin: 0; flex-grow: 1; }
        .timer { font-size: 1.5rem; color: #666; margin-bottom: 0.5rem; font-weight: bold; }
        .player-turn-header { font-size: 1.2rem; color: var(--secondary); font-weight: bold; margin-bottom: 1rem; }
        
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 1rem;}
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; vertical-align: middle; }
        .leaderboard-table th { background-color: var(--primary); color: white; }
        .leaderboard-table tr:nth-child(even) { background-color: #f9f9f9; }
        .gold-medal { font-size: 1.5rem; }
        .override-btn { background: #eee; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; margin-top: 5px; white-space: nowrap;}
        .override-btn:hover { background: #ddd; }
        
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; text-align: right; font-size: 1.1rem; margin-top: 10px; }
        .checkbox-grid label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-grid input[type="checkbox"] { width: auto; transform: scale(1.3); margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="welcome-screen" class="screen active">
        <h1>ארץ עיר <span class="version-badge">גרסה מקומית</span></h1>
        
        <div style="background: #f0f4f8; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
            <h3 style="margin-top:0; color:var(--primary);">מי משחק?</h3>
            <select id="num-players" onchange="updatePlayerInputs()">
                <option value="1">שחקן אחד (נגד השעון)</option>
                <option value="2">2 שחקנים (העברת הטלפון)</option>
                <option value="3">3 שחקנים (העברת הטלפון)</option>
            </select>
            
            <div id="player-inputs" style="margin-top: 10px;">
                <input type="text" id="p1-name" placeholder="שם שחקן 1" value="עופר">
                <input type="text" id="p2-name" placeholder="שם שחקן 2" style="display:none;" value="קליה">
                <input type="text" id="p3-name" placeholder="שם שחקן 3" style="display:none;" value="אורח">
            </div>
        </div>
        
        <div style="background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; text-align: center;">
            <p style="margin-top:0; color:var(--secondary); font-weight: bold;">סמן את הקטגוריות לביטול במשחק זה:</p>
            <div class="checkbox-grid">
                <label><input type="checkbox" id="disable-countries" value="countries"> מדינה</label>
                <label><input type="checkbox" id="disable-localities" value="localities"> יישוב</label>
                <label><input type="checkbox" id="disable-capitals" value="capitals"> עיר בירה</label>
                <label><input type="checkbox" id="disable-body_parts" value="body_parts"> איבר גוף</label>
                <label><input type="checkbox" id="disable-foods" value="foods"> מאכל</label>
                <label><input type="checkbox" id="disable-plants" value="plants"> צומח</label>
                <label><input type="checkbox" id="disable-animals" value="animals"> בעל חיים</label>
                <label><input type="checkbox" id="disable-boys" value="boys"> שם בן</label>
                <label><input type="checkbox" id="disable-girls" value="girls"> שם בת</label>
                <label><input type="checkbox" id="disable-professions" value="professions"> מקצוע</label>
            </div>
        </div>
        
        <button class="btn-primary" onclick="startGameSetup()" style="font-size: 1.5rem; padding: 15px;">התחל סיבוב!</button>
    </div>

    <div id="pass-phone-screen" class="screen">
        <h1 style="font-size: 3rem; color: var(--secondary);">העבירו את הטלפון!</h1>
        <h2 id="pass-phone-title" style="font-size: 2rem;"></h2>
        <p id="pass-phone-letter" style="font-size: 1.5rem; color: var(--primary);"></p>
        <button class="btn-success" onclick="startCountdownSequence()" style="font-size: 1.5rem; padding: 15px; margin-top: 30px;">הטלפון אצלי, בוא נתחיל!</button>
    </div>

    <div id="countdown-screen" class="screen">
        <div id="number" class="countdown">3</div>
    </div>

    <div id="letter-screen" class="screen">
        <h2>האות שנבחרה היא:</h2>
        <div id="selected-letter" class="letter-display">א</div>
    </div>

    <div id="game-screen" class="screen">
        <div class="timer" id="timer-display">זמן: 00:00</div>
        <div class="player-turn-header" id="current-player-display">שחקן נוכחי</div>
        <h2 id="game-letter-header" style="color: var(--primary); margin-top: 0;">אות: א</h2>
        <div id="categories-container"></div>
        <button class="btn-success" id="submit-btn" onclick="submitGame()" style="margin-top: 20px; font-size: 1.5rem; padding: 15px;">סיימתי!</button>
    </div>

    <div id="results-screen" class="screen">
        <h1 style="color: var(--success); font-size: 2.5rem; margin-bottom: 5px;">תוצאות הסיבוב!</h1>
        
        <table class="leaderboard-table" style="margin-bottom: 20px;">
            <thead><tr><th>מקום</th><th>שחקן</th><th>ניקוד</th><th>זמן</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        
        <h3 style="color: var(--primary); margin-bottom: 5px;">השוואת תשובות:</h3>
        <div style="overflow-x: auto; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.05);">
            <table class="leaderboard-table" id="results-table">
                <thead id="results-thead"></thead>
                <tbody id="results-body-detailed"></tbody>
            </table>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn-primary" onclick="resetForNewRound()" style="font-size: 1.3rem;">סיבוב חדש 🎮</button>
        </div>
    </div>
</div>

    function phoneticNormalize(word) {
        if (!word) return "";
        let w = word.trim().replace(/['"־\- ]/g, '');

        if (!cleanUser.startsWith(reqLetter)) {
            return { matchType: 'none', isCorrect: false, feedback: `מתחיל באות שגויה` };
        }
        
        let phonUser = phoneticNormalize(userWord);
        let dbArray = NORMALIZED_DATA[categoryId] || [];
        let bestDist = Infinity;
        
        for (let item of dbArray) {
            if (phonUser === item.phonetic) {
                return { matchType: 'exact', isCorrect: true, feedback: "" };
            }
            if (item.phonetic.startsWith(reqLetter)) {
                let dist = levenshteinDistance(cleanUser, item.original.replace(/['"־\- ]/g, ''));
                if (dist < bestDist) bestDist = dist;
            }
        }
        
        if (bestDist === 1 && cleanUser.length >= 3) {
            return { matchType: 'partial', isCorrect: true, feedback: "תשובה חלקית / כתיב שגוי" };
        }
        return { matchType: 'none', isCorrect: false, feedback: "לא במאגר" };
    }

    // ==========================================
    // 3. ניהול המשחק המקומי (מרובה משתתפים)
    // ==========================================
    const CATEGORIES = [
        { id: 'countries', label: 'מדינה' },
        { id: 'localities', label: 'יישוב בישראל' },
        { id: 'capitals', label: 'עיר בירה' },
        { id: 'body_parts', label: 'איבר גוף' },
        { id: 'foods', label: 'מאכל' },
        { id: 'plants', label: 'צומח' },
        { id: 'animals', label: 'בעל חיים' },
        { id: 'boys', label: 'שם של בן' },
        { id: 'girls', label: 'שם של בת' },
        { id: 'professions', label: 'מקצוע' }
    ];

    let activeCategories = [];
    let currentLetter = '';
    let startTime;
    let timerInterval;
    
    // ניהול שחקנים
    let players = [];
    let currentPlayerIndex = 0;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updatePlayerInputs() {
        const num = parseInt(document.getElementById('num-players').value);
        document.getElementById('p2-name').style.display = num >= 2 ? 'block' : 'none';
        document.getElementById('p3-name').style.display = num >= 3 ? 'block' : 'none';
    }

    function startGameSetup() {
        // איסוף שחקנים
        const num = parseInt(document.getElementById('num-players').value);
        players = [];
        for (let i = 1; i <= num; i++) {
            let name = document.getElementById(`p${i}-name`).value.trim() || `שחקן ${i}`;
            players.push({ name: name, score: 0, time: 0, answers: {} });
        }

        // איסוף קטגוריות
        let disabledList = [];
        document.querySelectorAll('#welcome-screen input[type="checkbox"]:checked').forEach(cb => {
            disabledList.push(cb.value);
        });
        
        if (disabledList.length >= CATEGORIES.length) {
            return alert("חייבים להשאיר לפחות קטגוריה אחת פעילה!");
        }

        activeCategories = CATEGORIES.filter(c => !disabledList.includes(c.id));

        // הגרלת אות לסיבוב הנוכחי
        const letters = "אבגדהזחטיכלמנסעפצקרשת";
        currentLetter = letters[Math.floor(Math.random() * letters.length)];
        
        currentPlayerIndex = 0;
        startTurnFlow();
    }

    function startTurnFlow() {
        // התיקון הקריטי: מחזירים את הכפתור למצב פעיל בכל תור חדש
        const submitBtn = document.getElementById('submit-btn');
        if(submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerText = "סיימתי!";
        }

        // מנקה את השדות לשחקן החדש
        const container = document.getElementById('categories-container');
        container.innerHTML = '';
        activeCategories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category-row';
            div.innerHTML = `
                <label>${cat.label}</label>
                <input type="text" id="input-${cat.id}" placeholder="הכנס מילה ב-${currentLetter}...">
                <button class="btn-skip" onclick="document.getElementById('input-${cat.id}').value='---'">דלג</button>
            `;
            container.appendChild(div);
        });

        if (players.length === 1) {
            startCountdownSequence();
        } else {
            document.getElementById('pass-phone-title').innerText = `תורו של: ${players[currentPlayerIndex].name}`;
            document.getElementById('pass-phone-letter').innerText = `(האות לסיבוב זה: ${currentLetter})`;
            showScreen('pass-phone-screen');
        }
    }

    function startCountdownSequence() {
        showScreen('countdown-screen');
        let count = 3;
        document.getElementById('number').innerText = count;
        
        const iv = setInterval(() => {
            count--;
            if (count === 0) {
                clearInterval(iv);
                document.getElementById('selected-letter').innerText = currentLetter;
                showScreen('letter-screen');
                setTimeout(() => { showGameFields(); }, 1500);
            } else {
                document.getElementById('number').innerText = count;
            }
        }, 1000);
    }

    function showGameFields() {
        showScreen('game-screen');
        document.getElementById('game-letter-header').innerText = "האות היא: " + currentLetter;
        document.getElementById('current-player-display').innerText = `שחקן: ${players[currentPlayerIndex].name}`;
        
        // התחלת שעון
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const secs = String(elapsed % 60).padStart(2, '0');
        document.getElementById('timer-display').innerText = `זמן: ${mins}:${secs}`;
    }

    function submitGame() {
        clearInterval(timerInterval);
        
        const submitBtn = document.getElementById('submit-btn');
        if(submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerText = "מעבד תוצאות...";
        }

        const timeInSecs = Math.floor((Date.now() - startTime) / 1000);
        const currentPlayer = players[currentPlayerIndex];
        
        currentPlayer.time = timeInSecs;
        currentPlayer.score = 0;
        const pointsPerQuestion = 100 / activeCategories.length;

        // שמירת תשובות
        activeCategories.forEach(cat => {
            const inputEl = document.getElementById('input-' + cat.id);
            const val = inputEl ? inputEl.value.trim() : "";
            
            if (val === "---" || val === "") {
                currentPlayer.answers[cat.id] = { val: "דלג", isCorrect: false, points: 0, feedback: "", label: cat.label };
            } else {
                const validation = validateWord(val, currentLetter, cat.id);
                let qPoints = 0;
                if(validation.matchType === 'exact') qPoints = pointsPerQuestion;
                else if(validation.matchType === 'partial') qPoints = pointsPerQuestion / 2;
                
                qPoints = formatScore(qPoints);
                currentPlayer.answers[cat.id] = { val: val, isCorrect: validation.isCorrect, points: qPoints, feedback: validation.feedback, label: cat.label };
                currentPlayer.score += qPoints;
            }
        });
        currentPlayer.score = formatScore(currentPlayer.score);

        // שהיית ביניים קלה לחווית משתמש לפני מעבר מסך
        setTimeout(() => {
            currentPlayerIndex++;
            if (currentPlayerIndex < players.length) {
                startTurnFlow();
            } else {
                calculateAndShowResults();
            }
        }, 500);
    }

    // פונקציה לאישור ידני (עקיפת המערכת)
    function overrideAnswer(playerIndex, catId) {
        const player = players[playerIndex];
        const ans = player.answers[catId];
        const pointsPerQuestion = formatScore(100 / activeCategories.length);
        
        player.score -= ans.points; 
        ans.points = pointsPerQuestion;
        ans.isCorrect = true;
        ans.feedback = "אושר ידנית";
        player.score += ans.points;
        player.score = formatScore(player.score);
        
        calculateAndShowResults(); // ציור מחדש של הטבלה
    }

    function getAnswerCellHtml(ans, catId, playerIndex) {
        if (!ans || !ans.val || ans.val === "דלג" || ans.val === "---") {
            return '<td style="color:#999; vertical-align:middle;">⚪ דילג</td>';
        }
        
        const pointsPerQ = activeCategories.length > 0 ? (100 / activeCategories.length) : 0;
        const isFullPoints = Math.abs(ans.points - pointsPerQ) < 0.01;
        
        let status = '';
        let overrideBtn = '';

        if (ans.isCorrect) {
            if (isFullPoints) {
                status = `<br><span style="color:green; font-size:0.8em;">✅ ${ans.points} נק'</span>`;
            } else {
                status = `<br><span style="color:orange; font-size:0.8em;">✅ ${ans.points} נק' (${ans.feedback})</span>`;
                overrideBtn = `<br><button class="override-btn" onclick="overrideAnswer(${playerIndex}, '${catId}')">הייתי צודק!</button>`;
            }
        } else {
            status = `<br><span style="color:red; font-size:0.8em;">❌ 0 נק' (${ans.feedback})</span>`;
            overrideBtn = `<br><button class="override-btn" onclick="overrideAnswer(${playerIndex}, '${catId}')">הייתי צודק!</button>`;
        }
        
        return `<td style="vertical-align:middle;"><strong>${ans.val}</strong>${status}${overrideBtn}</td>`;
    }

    function calculateAndShowResults() {
        showScreen('results-screen');
        
        // מיון השחקנים לטבלת המנצחים
        let sortedPlayers = [...players].sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return a.time - b.time; // במקרה של תיקו, המהיר מנצח
        });

        // ציור טבלת המנצחים
        const leadBody = document.getElementById('leaderboard-body');
        leadBody.innerHTML = '';
        sortedPlayers.forEach((p, idx) => {
            let placeIcon = idx + 1;
            if (idx === 0) placeIcon = "🥇";
            else if (idx === 1) placeIcon = "🥈";
            else if (idx === 2) placeIcon = "🥉";
            
            leadBody.innerHTML += `
                <tr>
                    <td class="${idx === 0 ? 'gold-medal' : ''}">${placeIcon}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.score}</td>
                    <td style="color:#666;">${p.time} שנ'</td>
                </tr>`;
        });

        // ציור טבלת השוואת התשובות המפורטת
        const thead = document.getElementById('results-thead');
        const tbody = document.getElementById('results-body-detailed');
        
        let theadHtml = `<tr><th>קטגוריה</th>`;
        players.forEach(p => {
            theadHtml += `<th>${p.name}</th>`;
        });
        theadHtml += `</tr>`;
        thead.innerHTML = theadHtml;

        tbody.innerHTML = '';
        activeCategories.forEach(cat => {
            let rowHtml = `<tr><td style="font-weight:bold; background:#f0f4f8; vertical-align:middle;">${cat.label}</td>`;
            players.forEach((p, pIndex) => {
                rowHtml += getAnswerCellHtml(p.answers[cat.id], cat.id, pIndex);
            });
            rowHtml += `</tr>`;
            tbody.innerHTML += rowHtml;
        });
    }

    // פונקציה שמאפסת את הנתונים וחוזרת למסך הראשי
    function resetForNewRound() {
        showScreen('welcome-screen');
    }
</script>
